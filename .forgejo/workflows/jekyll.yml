name: Build Jekyll

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: docker:docker://docker.io/library/node:20-bookworm

    container:
      image: local/jekyll-builder:1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ruby dependencies
        run: bundle install

      - name: Build site
        run: bundle exec jekyll build -d _site

      - name: Verify output
        run: ls -lah _site

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site
          path: _site/
          if-no-files-found: error
