name: Build and Deploy Jekyll

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: docker

    container:
      image: local/jekyll-builder:1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ruby dependencies
        run: |
          bundle install

      - name: Build site
        run: |
          bundle exec jekyll build -d _site

      - name: Package build into deploy volume
        run: |
          PROJECT=blog
          RELEASE=$(date +%Y%m%d-%H%M%S)

          mkdir -p /deploy/$PROJECT/releases/$RELEASE

          cp -a _site/. /deploy/$PROJECT/releases/$RELEASE

          echo $RELEASE > /deploy/$PROJECT/LATEST

          ln -sfn /deploy/$PROJECT/releases/$RELEASE /deploy/$PROJECT/current

      - name: Verify mount
        run: |
          mount | grep deploy
          ls -la /deploy

  deploy:
    runs-on: docker

    needs: build

    container:
      image: docker.io/library/debian:bookworm

    steps:
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y coreutils

      - name: Verify deployment
        run: |
          test -f /deploy/blog/current/index.html
